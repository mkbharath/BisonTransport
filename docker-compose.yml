services:
  # --- Infrastructure ---
  postgres:
    image: pgvector/pgvector:pg16
    container_name: order-postgres
    environment:
      POSTGRES_USER: orderuser
      POSTGRES_PASSWORD: orderpass
      POSTGRES_DB: orderdb
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U orderuser -d orderdb"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: order-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  elasticmq:
    image: softwaremill/elasticmq
    container_name: order-elasticmq
    ports:
      - "9324:9324"
      - "9325:9325"
    volumes:
      - ./infrastructure/docker/elasticmq.conf:/opt/elasticmq.conf

  minio:
    image: minio/minio
    container_name: order-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio-setup:
    image: minio/mc
    container_name: order-minio-setup
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin;
      mc mb local/attachments --ignore-existing;
      mc mb local/extracted-text --ignore-existing;
      mc mb local/exports --ignore-existing;
      exit 0;
      "

  mailhog:
    image: axllent/mailpit
    container_name: order-mailhog
    ports:
      - "1025:1025"
      - "8025:8025"
    environment:
      MP_SMTP_AUTH_ACCEPT_ANY: 1
      MP_SMTP_AUTH_ALLOW_INSECURE: 1
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8025/api/v1/info || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 5

  # --- Application Services ---
  api:
    build:
      context: .
      dockerfile: infrastructure/docker/Dockerfile.api
    container_name: order-api
    ports:
      - "8000:8000"
    env_file:
      - .env.local
    environment:
      DATABASE_URL: postgresql+asyncpg://orderuser:orderpass@postgres:5432/orderdb
      DATABASE_URL_SYNC: postgresql://orderuser:orderpass@postgres:5432/orderdb
      REDIS_URL: redis://redis:6379/0
      QUEUE_ENDPOINT_URL: http://elasticmq:9324
      STORAGE_ENDPOINT_URL: http://minio:9000
      SMTP_HOST: mailhog
      SMTP_PORT: 1025
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      elasticmq:
        condition: service_started
      minio-setup:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/api/v1/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - ./packages/api:/app/packages/api
      - ./packages/shared/python:/app/packages/shared/python
      - ./scripts:/app/scripts

  agents:
    build:
      context: .
      dockerfile: infrastructure/docker/Dockerfile.agents
    container_name: order-agents
    env_file:
      - .env.local
    environment:
      DATABASE_URL: postgresql+asyncpg://orderuser:orderpass@postgres:5432/orderdb
      DATABASE_URL_SYNC: postgresql://orderuser:orderpass@postgres:5432/orderdb
      REDIS_URL: redis://redis:6379/0
      QUEUE_ENDPOINT_URL: http://elasticmq:9324
      STORAGE_ENDPOINT_URL: http://minio:9000
      SMTP_HOST: mailhog
      SMTP_PORT: 1025
      EMAIL_INBOX_DIR: /app/test-emails/inbox
    depends_on:
      api:
        condition: service_healthy
      mailhog:
        condition: service_healthy
    volumes:
      - ./packages/agents:/app/packages/agents
      - ./packages/shared/python:/app/packages/shared/python
      - ./test-emails:/app/test-emails

  frontend:
    build:
      context: .
      dockerfile: infrastructure/docker/Dockerfile.frontend
    container_name: order-frontend
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://api:8000
    depends_on:
      api:
        condition: service_healthy
    volumes:
      - ./packages/frontend:/app
      - /app/node_modules

volumes:
  postgres-data:
  redis-data:
  minio-data:
