include classpath("application.conf")

node-address {
  protocol = http
  host = "*"
  port = 9324
  context-path = ""
}

rest-sqs {
  enabled = true
  bind-port = 9324
  bind-hostname = "0.0.0.0"
  sqs-limits = strict
}

rest-stats {
  enabled = true
  bind-port = 9325
  bind-hostname = "0.0.0.0"
}

queues {
  document-processing {
    defaultVisibilityTimeout = 120 seconds
    delay = 0 seconds
    receiveMessageWait = 5 seconds
    deadLettersQueue {
      name = "document-processing-dlq"
      maxReceiveCount = 3
    }
  }

  document-processing-dlq {
    defaultVisibilityTimeout = 120 seconds
  }

  extraction {
    defaultVisibilityTimeout = 180 seconds
    delay = 0 seconds
    receiveMessageWait = 5 seconds
    deadLettersQueue {
      name = "extraction-dlq"
      maxReceiveCount = 3
    }
  }

  extraction-dlq {
    defaultVisibilityTimeout = 120 seconds
  }

  validation {
    defaultVisibilityTimeout = 120 seconds
    delay = 0 seconds
    receiveMessageWait = 5 seconds
    deadLettersQueue {
      name = "validation-dlq"
      maxReceiveCount = 3
    }
  }

  validation-dlq {
    defaultVisibilityTimeout = 120 seconds
  }

  auto-process {
    defaultVisibilityTimeout = 60 seconds
    delay = 0 seconds
    receiveMessageWait = 5 seconds
    deadLettersQueue {
      name = "auto-process-dlq"
      maxReceiveCount = 3
    }
  }

  auto-process-dlq {
    defaultVisibilityTimeout = 120 seconds
  }

  hitl {
    defaultVisibilityTimeout = 60 seconds
    delay = 0 seconds
    receiveMessageWait = 5 seconds
  }

  communication {
    defaultVisibilityTimeout = 120 seconds
    delay = 0 seconds
    receiveMessageWait = 5 seconds
    deadLettersQueue {
      name = "communication-dlq"
      maxReceiveCount = 3
    }
  }

  communication-dlq {
    defaultVisibilityTimeout = 120 seconds
  }

  exception {
    defaultVisibilityTimeout = 60 seconds
    delay = 0 seconds
    receiveMessageWait = 5 seconds
  }
}
