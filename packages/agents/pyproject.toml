[project]
name = "order-agents"
version = "0.1.0"
description = "AI Agents for Order Intelligence Platform"
requires-python = ">=3.12"
dependencies = [
    "order-shared",
    "anthropic>=0.28.0",
    "pdfplumber>=0.11.0",
    "pytesseract>=0.3.10",
    "openpyxl>=3.1.0",
    "python-docx>=1.1.0",
    "mammoth>=1.8.0",
    "tabula-py>=2.9.0",
    "langchain-core>=0.2.0",
    "numpy>=1.26.0",
    "pgvector>=0.3.0",
    "aiofiles>=24.1.0",
    "watchfiles>=0.22.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.2.0",
    "pytest-asyncio>=0.23.0",
    "testcontainers>=4.5.0",
    "mypy>=1.10.0",
    "ruff>=0.4.0",
    "black>=24.4.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/order_agents"]

[tool.black]
line-length = 100
target-version = ["py312"]

[tool.isort]
profile = "black"
line_length = 100

[tool.ruff]
line-length = 100
target-version = "py312"

[tool.ruff.lint]
select = ["E", "F", "W", "I", "N", "UP", "S", "B", "A", "C4", "PT"]
ignore = ["S101"]

[tool.mypy]
python_version = "3.12"
strict = true

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
